<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AlgoForge — Custom Forex Algorithms</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--gold:#c9a84c;
--dark:#080a0f;
--text:#e8eaf0;
--muted:#7a8499;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:var(--dark);
color:var(--text);
font-family:'DM Sans',sans-serif;
overflow-x:hidden;
}

/* DISABLE CURSOR ON MOBILE */
@media(max-width:768px){
.cursor,.cursor-ring{display:none;}
}

/* NAV */
nav{
position:fixed;
top:0;left:0;right:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:1rem 1.5rem;
background:rgba(0,0,0,0.85);
z-index:1000;
}

.nav-links{
display:flex;
gap:1.5rem;
list-style:none;
}

.nav-links a{
color:var(--muted);
text-decoration:none;
font-size:0.9rem;
}

.nav-cta{
background:var(--gold);
padding:0.5rem 1rem;
text-decoration:none;
color:black;
font-weight:600;
}

/* HAMBURGER */
.hamburger{
display:none;
flex-direction:column;
gap:4px;
cursor:pointer;
}
.hamburger span{
width:22px;height:2px;background:var(--gold);
}

/* HERO */
#hero{
padding:100px 4rem;
min-height:100vh;
display:flex;
align-items:center;
}

h1{
font-size:5rem;
font-family:'Bebas Neue';
}

.hero-sub{
margin-top:1rem;
color:var(--muted);
max-width:500px;
}

.hero-btns{
margin-top:2rem;
display:flex;
gap:1rem;
}

.btn{
padding:0.8rem 1.5rem;
text-decoration:none;
font-weight:600;
}

.btn-primary{background:var(--gold);color:black;}
.btn-outline{border:1px solid var(--gold);color:var(--gold);}

/* SECTION */
section{padding:6rem 4rem;}

h2{
font-family:'Bebas Neue';
font-size:3rem;
margin-bottom:1rem;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:1.5rem;
}

.card{
background:#111;
padding:2rem;
border:1px solid #222;
}

/* MOBILE */
@media(max-width:768px){

nav{padding:1rem;}

.nav-cta{display:none;}

.hamburger{display:flex;}

.nav-links{
display:none;
position:absolute;
top:60px;
left:0;right:0;
flex-direction:column;
background:#111;
padding:1rem;
}

.nav-links.active{display:flex;}

#hero{
padding:90px 1.2rem;
text-align:center;
}

h1{font-size:2.4rem;}

.hero-sub{
font-size:0.95rem;
margin:auto;
}

.hero-btns{
flex-direction:column;
align-items:center;
}

.btn{
width:100%;
max-width:280px;
text-align:center;
}

section{
padding:3.5rem 1.2rem;
}

h2{font-size:1.8rem;}

.grid{
grid-template-columns:1fr;
}

}

/* BUTTON TOUCH */
a,button{min-height:44px;}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<div>ALGOFORGE</div>

<ul class="nav-links">
<li><a href="#">Process</a></li>
<li><a href="#">Features</a></li>
<li><a href="#">Pricing</a></li>
</ul>

<a href="#" class="nav-cta">Get Algo</a>

<div class="hamburger" id="ham">
<span></span><span></span><span></span>
</div>
</nav>

<!-- HERO -->
<section id="hero">
<div>
<h1>Your Strategy.<br>Our Execution.</h1>

<p class="hero-sub">
Custom forex trading algorithms built exactly as per your rules.
</p>

<div class="hero-btns">
<a href="#" class="btn btn-primary">Start ₹5000</a>
<a href="#" class="btn btn-outline">Learn More</a>
</div>
</div>
</section>

<!-- FEATURES -->
<section>
<h2>Features</h2>
<div class="grid">
<div class="card">Multi Indicator</div>
<div class="card">Risk Management</div>
<div class="card">Auto Trading</div>
</div>
</section>

<script>
document.getElementById("ham").onclick=function(){
document.querySelector(".nav-links").classList.toggle("active");
}
</script>

</body>
</html>
